# =============================================================
# AuditAX Nexus Hub — Docker Compose
# Orchestrates the API server, Kafka worker, and a local Kafka broker (Redpanda)
# to enable zero-configuration local development.
# =============================================================

services:
  # ---- Local Kafka Broker (Redpanda - high performance, no Zookeeper required) ----
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.10
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://kafka:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "9092:9092"
      - "8082:8082"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 2s
      retries: 5

  # ---- API Server (Express + Vite SSR in prod) ----
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_SSL=false
      - KAFKA_USERNAME=
      - KAFKA_PASSWORD=
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- Kafka Worker (AI processing consumer) ----
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_SSL=false
      - KAFKA_USERNAME=
      - KAFKA_PASSWORD=
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1
